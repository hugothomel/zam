name: Zam
options:
  bundleIdPrefix: gg.alakazam
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  fileVersion: "56"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_BITCODE: NO

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    majorVersion: 2.0.0

targets:
  Zam:
    type: application
    platform: iOS
    sources:
      - path: Zam
      - path: ZamFeed
      - path: Shared
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/EmbeddedModels
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: gg.alakazam.zam
        DEVELOPMENT_TEAM: BNU89VU6JB
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Zam/Info.plist
        PRODUCT_NAME: Zam
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Zam/Zam.entitlements
        METAL_LIBRARY_FILE_BASE: default
    dependencies:
      - package: Supabase
        product: Supabase
